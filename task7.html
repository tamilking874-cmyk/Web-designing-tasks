<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> form table</title>

</head>
<body>
   <table border="" align="center">
    <form>
        <tr>
            <th colspan="2">Fill the form below</th>
        </tr>
        <tr>
            <td>
                <label>Name</label>
                <td>
                    <input type="text" name=" id="">
                </td>
            </td>
        </tr>
        <tr>
            <td>
                <label for="">Password</label>
                <td>
                    <input type="password" name="" id="">
                </td>
            </td>
        </tr>
        <tr>
            <td>
                <label for="">Feedback</label>
                <td><textarea name="" id=""></textarea></td>
            </td>
        </tr>
        <tr>
            <td>
                <label for="">Gender</label>
                <td>
                    <input type="radio" name="0" value="1">male
                    <input type="radio" name="0" value="1" id="">female
                </td>
            </td>
        </tr>
        <tr>
            <td>
                <label for="">subject</label>
                <td>
                    <input type="checkbox" name="" id="">Web
                    <input type="checkbox" name="" id="">Math
                    <input type="checkbox" name="" id="">Graphics
                    <input type="checkbox" name="" id="">English
                </td>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <button>Reset all</button>
                <button>Submit Above Details</button>
            </td>
        </tr>                                     




        

    
</body>
</html>

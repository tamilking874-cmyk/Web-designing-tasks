<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table style="background-color: rgba(15, 184, 202, 0.472);" align="center"cellpadding="10" 
        <form>
            <tr>
                <th colspan="2"><u>Registration form </u></th>
            </tr>
 
            <tr>
                <td>First Name :</td>
                <td><input type="text"> </td>
            </tr>
            
            <tr>
                <td>Last Name</td>
                <td><input type="text"></td>
            </tr>
            
            <tr>
                <td>e-mail :</td>
                <td><input type="text"></td>
            </tr>
            
            <tr>
                <td>password :</td>
                <td><input type="text"></td>
            </tr>
            
            <tr>
                <td>Date of birth :</td>
                <td><input type="date"></td>
            </tr>
            
            <tr>
                <td>Gender :</td>
                <td>
                    <input type="radio" value="1" name="">Male
                    <input type="radio" value="1" name="">Female
                    <input type="radio" value="" name="">Others
                </td>
            </tr>
            
            <tr>
                <td>Mobile :</td>
                <td><input type="text"></td>
            </tr>
            
            <tr>
                <td>Address :</td>
                <td>
                    <textarea style="width: 150px; height: 58px"></textarea>
                </td>
            </tr>
            
            <tr align="center">
                <td colspan="2">
                    <input type="Reset">
                    <input type="Sub">
                    
                </td>
            </tr>
        </form>
    </table>

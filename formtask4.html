<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>GeeksforGeeks</h1>
    <h2>Basic form design using HTML</h2>

    <form>
        <fieldset>
            <legend>Personal Details</legend>

            <label>First Name:</label>
            <input type="text"> <br><br>

            <label>Last Name:</label>
            <input type="text" placeholder="Optional"><br><br>

            <label>Gender</label>
            <input type="radio" value="1" name="0"> male
            <input type="radio" value="1" name="0"> female <br><br>
            
            <label>Email:</label>
            <input type="email"><br><br>

            <label>Date of Birth:</label>
            <input type="Date"><br><br>

            <label>Address:</label>
            <textarea rows="4" cols="45"></textarea><br><br>
            <input type="Submit">
            </fieldset>
        </form>    






    
</body>
</html>
